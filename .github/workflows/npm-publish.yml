name: npm publish

# release 발행 시 자동 배포, workflow_dispatch 로 수동 배포(첫 배포·재시도용).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      # package-lock 기반 재현 설치 후 테스트를 통과해야 배포한다.
      - run: npm ci
      - run: npm test

      # NPM_TOKEN(Automation/Granular, 2FA 우회)으로 인증. CI 는 OTP 입력이 불가하다.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
